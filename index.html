<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BookDekho</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Navbar -->
  <header>
    <nav class="navbar">
      <h1 class="logo">📚 Book Dekho</h1>

      <ul class="nav-links" id="navLinks">
        <li><a href="#">Home</a></li>
        <li><a href="#">Books</a></li>
        <li><a href="#">Categories</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      <div class="cart">
        🛒 <span id="cart-count">0</span>
      </div>

      <div class="menu-toggle" id="menu-toggle">
        ☰
      </div>
    </nav>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <h2>Discover Your Next Favorite Book</h2>
      <p>Buy bestselling books at affordable prices.</p>
      <button>Shop Now</button>
    </div>
  </section>

  <!-- Books Section -->
  <section class="books-section">
    <h2>Popular Books</h2>

    <div class="books-container">

      <!-- Book 1 -->
      <div class="book-card">
        <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f" alt="Book">
        <h3>The Great Adventure</h3>
        <p>₹299</p>
        <button class="add-cart">Add to Cart</button>
      </div>

      <!-- Book 2 -->
      <div class="book-card">
        <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794" alt="Book">
        <h3>Mindset Mastery</h3>
        <p>₹299</p>
        <button class="add-cart">Add to Cart</button>
      </div>

      <!-- Book 3 -->
      <div class="book-card">
        <img src="https://images.unsplash.com/photo-1524578271613-d550eacf6090" alt="Book">
        <h3>Science of Success</h3>
        <p>₹199</p>
        <button class="add-cart">Add to Cart</button>
      </div>

      <!-- Book 4 -->
      <div class="book-card">
        <img src="https://images.unsplash.com/photo-1516979187457-637abb4f9353" alt="Book">
        <h3>Fantasy World</h3>
        <p>₹399</p>
        <button class="add-cart">Add to Cart</button>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 BookDekho | All Rights Reserved</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
